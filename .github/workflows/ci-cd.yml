name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    name: Code Quality Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: HTML Validation
        run: |
          echo "Checking HTML structure..."
          grep -q '<!DOCTYPE html>' html/index.html && echo "✓ HTML DOCTYPE found"
          grep -q 'charset="UTF-8"' html/index.html && echo "✓ UTF-8 charset found"
          grep -q 'viewport' html/index.html && echo "✓ Viewport meta found"
      
      - name: CSS Validation
        run: |
          echo "Checking CSS..."
          wc -l css/styles.css
          grep -q ':root' css/styles.css && echo "✓ CSS variables found"
          grep -q '@media' css/styles.css && echo "✓ Media queries found"
      
      - name: JS Syntax Check
        run: |
          echo "Checking JavaScript..."
          node --check js/main.js 2>&1 || echo "Basic syntax check"
          wc -l js/main.js
      
      - name: Check for console errors pattern
        run: |
          echo "Checking for common issues..."
          ! grep -q 'console.log()' js/main.js || echo "Note: console.log found"
          ! grep -q 'TODO' js/main.js || echo "Note: TODO found"

  build:
    name: Build Verification
    runs-on: ubuntu-latest
    needs: lint
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Verify file structure
        run: |
          echo "Project structure:"
          ls -la
          echo ""
          echo "Source files:"
          find . -name "*.html" -o -name "*.css" -o -name "*.js" | head -20
      
      - name: Check CDN resources
        run: |
          echo "Verifying CDN links..."
          grep -o 'https://[^"]*' html/index.html | head -10

  deploy:
    name: GitHub Pages Deploy
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/main'
    
    permissions:
      contents: read
      pages: write
      id-token: write
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Pages
        uses: actions/configure-pages@v4
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'
      
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  notify:
    name: Deployment Notification
    runs-on: ubuntu-latest
    needs: deploy
    if: always()
    
    steps:
      - name: Send notification on failure
        if: needs.deploy.result == 'failure'
        run: |
          echo "Deployment failed! Check the logs for details."
      
      - name: Success message
        if: needs.deploy.result == 'success'
        run: |
          echo "✓ Deployment completed successfully!"
          echo "Site deployed to: https://badhope.github.io/cipher-nexus/"
